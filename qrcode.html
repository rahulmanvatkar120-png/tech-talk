<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talk - QR Code</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #000000;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: #1a1a1a;
            border-radius: 1rem;
            border: 1px solid #d4a853;
        }
        h1 { color: #d4a853; margin-bottom: 1.5rem; font-size: 1.5rem; }
        img { border-radius: 10px; }
        p { color: #f5f5f3; margin-top: 1rem; font-size: 0.9rem; }
        a { color: #d4a853; text-decoration: none; margin-top: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tech Talk</h1>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://rahulmanvatkar120-png.github.io/tech-talk/" alt="QR Code">
        <p>Scan to visit website</p>
    </div>
</body>
</html>
